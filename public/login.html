<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — AutoChatbot</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="auth-logo-icon">🤖</span>
        <div class="auth-brand">AutoChatbot</div>
        <div class="auth-tagline">AI-powered chatbots for any website</div>
      </div>

      <div id="login-error" class="form-error"></div>
      <div class="form-group">
        <label class="form-label" for="login-email">Email</label>
        <input id="login-email" class="form-input" type="email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <div class="pw-wrap">
          <input id="login-password" class="form-input" type="password" placeholder="••••••••" autocomplete="current-password" />
          <button type="button" class="pw-toggle" onclick="togglePw('login-password',this)" tabindex="-1">👁</button>
        </div>
      </div>
      <button class="btn btn-primary btn-lg btn-full" id="btn-login" onclick="login()">Sign In</button>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>
  <script src="/js/auth.js"></script>
</body>
</html>
