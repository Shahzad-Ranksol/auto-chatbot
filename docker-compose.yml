version: '3.9'

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-autochatbot}
      MYSQL_USER: ${DB_USER:-chatbot}
      MYSQL_PASSWORD: ${DB_PASSWORD:-chatbotpassword}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file: .env
    environment:
      DB_HOST: db
    volumes:
      - uploads:/app/uploads
      - icons:/app/public/uploads/icons
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
  uploads:
  icons:
